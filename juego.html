<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Juego de Coche - RACC Mobility</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
        background: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #game-container {
        position: relative;
        width: 1000px;
        height: 600px;
        background: white;
        overflow: hidden;
        border: 4px solid #333;
      }

      canvas {
        display: block;
        background: #add8e6;
      }

      #interior-coche {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 260px;
        object-fit: cover;  
        pointer-events: none;
        z-index: 10;
      }

      /* --- NUEVOS ESTILOS PARA LA NOTIFICACIÓN --- */
      #notificacion-movil {
        position: absolute;
        right: -350px; /* Escondido */
        top: 200px;
        width: 280px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        padding: 15px;
        z-index: 2000; /* Por encima de todo */
        transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 3px solid #25d366;
      }

      #notificacion-movil.mostrar {
        right: 20px !important;
      }

      .notificacion-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #25d366;
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 8px;
      }

      #cerrar-notificacion {
        background: #eee;
        border: none;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        cursor: pointer;
        font-weight: bold;
      }
      /* ------------------------------------------ */

      #velocimetroFijo {
        position: absolute;
        top: 20px; /* Ajustado para que no estorbe */
        right: 30px;
        background: rgba(0, 0, 0, 0.7);
        color: #2ecc71;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 18px;
        font-weight: bold;
        border: 1.5px solid #2ecc71;
        z-index: 130;
        min-width: 80px;
        text-align: center;
      }

      #avisoC {
        position: absolute;
        top: 10px;
        left: 20px;
        color: white;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 8px;
        border-radius: 4px;
        z-index: 210;
        pointer-events: none;
      }

      #controlesUI {
        position: absolute;
        top: 40px;
        left: 20px;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 15px;
        border-radius: 8px;
        border-left: 5px solid #f1c40f;
        z-index: 200;
        display: none;
      }

      .tecla { color: #f1c40f; font-weight: bold; }

      #startScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1500;
      }

      #btnIniciarVerde {
        background: #2ecc71;
        color: white;
        font-size: 24px;
        font-weight: bold;
        padding: 15px 40px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 0 #27ae60;
      }

      #botonReiniciarImg {
        width: 220px;
        height: auto;
        cursor: pointer;
        display: none;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="notificacion-movil">
        <div class="notificacion-header">
          <span>💬 WhatsApp</span>
          <button id="cerrar-notificacion" onclick="cerrarMensaje()">×</button>
        </div>
        <p id="texto-mensaje" style="margin:0; color:#333; font-size:14px;">¡Tienes un mensaje!</p>
      </div>

      <div id="avisoC">Pulsa <span class="tecla">C</span> para ver controles</div>
      <div id="velocimetroFijo">0 km/h</div>

      <div id="controlesUI">
        <div style="font-size: 14px; margin-bottom: 5px"><strong>CONTROLES</strong></div>
        <div style="font-size: 13px; line-height: 1.5">
          <span class="tecla">➡️</span> ACELERAR / <span class="tecla">⬅️</span> FRENAR<br />
          <span class="tecla">⬆️/⬇️</span> CARRIL / <span class="tecla">C</span> CERRAR
        </div>
      </div>

      <div id="startScreen">
        <h1 id="mensajeEstado" style="color: white; margin-bottom: 20px">JUEGO DE COCHE</h1>
        <img src="images/boton_reiniciar.png" id="botonReiniciarImg" alt="Reiniciar" />
        <button id="btnIniciarVerde">INICIAR</button>
      </div>

      <canvas id="gameCanvas"></canvas>
      <img src="images/img_coche_dentro.png" id="interior-coche" />
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const startScreen = document.getElementById("startScreen");
      const btnIniciarVerde = document.getElementById("btnIniciarVerde");
      const btnResetImg = document.getElementById("botonReiniciarImg");
      const mensajeEstado = document.getElementById("mensajeEstado");
      const velocimetro = document.getElementById("velocimetroFijo");
      const divControles = document.getElementById("controlesUI");
      const avisoC = document.getElementById("avisoC");
      
      // Elementos de notificación
      const notifElement = document.getElementById("notificacion-movil");
      const textoElement = document.getElementById("texto-mensaje");

      const GAME_WIDTH = 1000;
      const GAME_HEIGHT = 600;
      let roadHeight = 220;
      let roadY = 150;
      const PLAYER_WIDTH = 160;
      const PLAYER_HEIGHT = 90;

      let gameStarted = false;
      let showControls = false;
      let lanes = [];
      let clouds = [];
      let enemyCars = [];
      let lastSpawnTime = 0;
      let invencibleHasta = 0;

      let minSpeed = 5;
      let maxSpeed = 10;
      let currentSpeed = minSpeed;
      let lineOffset = 0;

      // LÓGICA DE DISTRACCIÓN
      const misMensajes = [
        "Alejandro: ¿Dónde estás? Te esperamos! 📍",
        "Cristian: ¡Mira aquest video que moro de la risa jajaja! 😂",
        "Mama: ¡Arriba a l'hora de brenar!",
        "Dani germà: Nen, no t'ho creuràs... 😱",
        "Marc classe: ¿M'envies els deures de sistemes operatius? 📚"
      ];

      function lanzarNotificacion() {
        if (!gameStarted) return;
        textoElement.innerText = misMensajes[Math.floor(Math.random() * misMensajes.length)];
        notifElement.classList.add("mostrar");
        // Lanza otro mensaje aleatorio entre 8 y 12 segundos después
        setTimeout(lanzarNotificacion, 8000 + Math.random() * 4000);
      }

      function cerrarMensaje() {
        notifElement.classList.remove("mostrar");
      }

      // COCHE
      const car = {
        x: 80, y: 0, targetY: 0, speed: 12,
        image: new Image(), loaded: false,
      };
      car.image.src = "images/imagen_coche.png";
      car.image.onload = () => (car.loaded = true);

      const enemyImages = [];
      const sources = ["images/coche_de_cara1.png", "images/coche_de_cara2.png", "images/coche_de_cara3.png"];
      sources.forEach((src) => {
        const img = new Image();
        img.src = src;
        enemyImages.push(img);
      });

      let keys = {};
      window.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        if (e.key.toLowerCase() === "c") {
          showControls = !showControls;
          divControles.style.display = showControls ? "block" : "none";
          avisoC.style.opacity = showControls ? "0" : "1";
        }
      });
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      function setupWorld() {
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        lanes = [
          roadY + roadHeight * 0.25 - PLAYER_HEIGHT / 2,
          roadY + roadHeight * 0.75 - PLAYER_HEIGHT / 2,
        ];
        car.y = lanes[0];
        car.targetY = lanes[0];
        clouds = [];
        for (let i = 0; i < 5; i++) {
          clouds.push({
            x: Math.random() * canvas.width,
            y: Math.random() * (roadY - 80),
            size: 25, speed: 0.5,
          });
        }
      }
      setupWorld();

      function spawnEnemy() {
        let laneToSpawn = Math.floor(Math.random() * lanes.length);
        const imgIndex = Math.floor(Math.random() * enemyImages.length);
        enemyCars.push({
          width: 180, height: 100,
          x: canvas.width + 200,
          y: lanes[laneToSpawn],
          speed: 2,
          image: enemyImages[imgIndex],
        });
      }

      function iniciarPartida() {
        enemyCars = [];
        lastSpawnTime = 0;
        currentSpeed = minSpeed;
        car.y = lanes[0];
        car.targetY = lanes[0];
        invencibleHasta = performance.now() + 2000;
        gameStarted = true;
        startScreen.style.display = "none";
        cerrarMensaje();
        // El primer mensaje aparece a los 4 segundos de empezar
        setTimeout(lanzarNotificacion, 4000);
      }

      btnIniciarVerde.addEventListener("click", iniciarPartida);

      btnResetImg.addEventListener("click", () => {
        btnResetImg.style.display = "none";
        btnIniciarVerde.style.display = "block";
        mensajeEstado.innerText = "JUEGO DE COCHE";
        iniciarPartida();
      });

      function update(timestamp) {
        if (!gameStarted) return;

        if (keys["ArrowRight"]) currentSpeed += 0.03;
        else if (keys["ArrowLeft"]) currentSpeed -= 0.08;
        else if (currentSpeed > minSpeed) currentSpeed -= 0.01;

        currentSpeed = Math.max(minSpeed, Math.min(currentSpeed, maxSpeed));
        velocimetro.innerText = Math.floor(currentSpeed * 12) + " km/h";

        lineOffset -= currentSpeed * 2;
        if (lineOffset <= -100) lineOffset = 0;

        clouds.forEach((c) => {
          c.x -= c.speed * (currentSpeed / 4);
          if (c.x < -100) c.x = canvas.width + 100;
        });

        if (keys["ArrowUp"]) car.targetY = lanes[0];
        if (keys["ArrowDown"]) car.targetY = lanes[1];

        const diff = car.targetY - car.y;
        if (Math.abs(diff) > car.speed) car.y += Math.sign(diff) * car.speed;
        else car.y = car.targetY;

        for (let i = enemyCars.length - 1; i >= 0; i--) {
          let e = enemyCars[i];
          e.x -= e.speed + currentSpeed;

          if (timestamp > invencibleHasta) {
            if (
              car.x + 45 < e.x + e.width - 45 &&
              car.x + PLAYER_WIDTH - 45 > e.x + 45 &&
              car.y + 30 < e.y + e.height - 30 &&
              car.y + PLAYER_HEIGHT - 30 > e.y + 30
            ) {
              gameStarted = false;
              mensajeEstado.innerText = "¡HAS CHOCADO!";
              btnIniciarVerde.style.display = "none";
              btnResetImg.style.display = "block";
              startScreen.style.display = "flex";
              return;
            }
          }
          if (e.x < -300) enemyCars.splice(i, 1);
        }
      }

      function draw(timestamp) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, canvas.width, roadY);
        ctx.fillStyle = "#FFD700";
        ctx.beginPath();
        ctx.arc(canvas.width - 60, 50, 30, 0, Math.PI * 2);
        ctx.fill();

        clouds.forEach((c) => {
          ctx.fillStyle = "white";
          ctx.beginPath();
          ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(0, roadY, canvas.width, roadHeight);
        ctx.fillStyle = "#ecf0f1";
        ctx.fillRect(0, roadY, canvas.width, 6);
        ctx.fillRect(0, roadY + roadHeight - 6, canvas.width, 6);
        
        ctx.strokeStyle = "#f1c40f";
        ctx.lineWidth = 6;
        ctx.setLineDash([60, 40]);
        ctx.lineDashOffset = -lineOffset;
        ctx.beginPath();
        ctx.moveTo(0, roadY + roadHeight / 2);
        ctx.lineTo(canvas.width, roadY + roadHeight / 2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.save();
        if (timestamp < invencibleHasta && Math.floor(timestamp / 100) % 2 === 0)
          ctx.globalAlpha = 0.4;
        
        // DIBUJO JUGADOR CON RESPALDO (SI NO CARGA IMAGEN)
        if (car.loaded) {
          ctx.drawImage(car.image, car.x, car.y, PLAYER_WIDTH, PLAYER_HEIGHT);
        } else {
          ctx.fillStyle = "red";
          ctx.fillRect(car.x, car.y, PLAYER_WIDTH, PLAYER_HEIGHT);
        }
        ctx.restore();

        // DIBUJO ENEMIGOS CON RESPALDO
        enemyCars.forEach((e) => {
          if (e.image.complete && e.image.naturalWidth !== 0) {
            ctx.drawImage(e.image, e.x, e.y, e.width, e.height);
          } else {
            ctx.fillStyle = "blue";
            ctx.fillRect(e.x, e.y, e.width, e.height);
          }
        });
      }

      function gameLoop(timestamp) {
        update(timestamp);
        draw(timestamp);
        if (gameStarted) {
          if (!lastSpawnTime) lastSpawnTime = timestamp;
          let spawnRate = 1300 - currentSpeed * 30;
          if (timestamp - lastSpawnTime > Math.max(550, spawnRate)) {
            spawnEnemy();
            lastSpawnTime = timestamp;
          }
        }
        requestAnimationFrame(gameLoop);
      }
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
